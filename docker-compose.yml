services:
  # Ollama container (CPU, yavaş). Host Ollama kullanmak için bu servisi kapalı bırak.
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   restart: unless-stopped
  #   networks:
  #     - app-network

  schema-server:
    build:
      context: ./schema-server
      dockerfile: Dockerfile
    container_name: schema-server
    # Exposed for local testing (host curl); original design had only bot-server exposed
    # ports:
    #   - "5001:5001"
    environment:
      - SCHEMA_DIR=/data/schemas
    volumes:
      - ./data/schemas:/data/schemas:ro
    restart: unless-stopped
    networks:
      - app-network

  values-server:
    build:
      context: ./values-server
      dockerfile: Dockerfile
    container_name: values-server
    # Exposed for local testing (host curl); original design had only bot-server exposed
    # ports:
    #   - "5002:5002"
    environment:
      - VALUES_DIR=/data/values
    volumes:
      - ./data/values:/data/values:ro
    restart: unless-stopped
    networks:
      - app-network

  bot-server:
    build:
      context: ./bot-server
      dockerfile: Dockerfile
    container_name: bot-server
    # 5003: only external port; use curl -w to measure response time (see acıklama.md)
    ports:
      - "5003:5003"
    # Linux: host.docker.internal is not set by default; host-gateway makes it work (Mac/Windows unchanged)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Configurable via .env file (see .env.example)
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - LLM_MODEL=${LLM_MODEL:-llama3.2}
      - OLLAMA_NUM_PREDICT=${OLLAMA_NUM_PREDICT:-4096}
      # Internal service URLs (no need to change)
      - SCHEMA_SERVICE_URL=http://schema-server:5001
      - VALUES_SERVICE_URL=http://values-server:5002
    restart: unless-stopped
    depends_on:
      - schema-server
      - values-server
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  ollama_data:
